<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Nyanko · Extensión</title><link rel="stylesheet" href="styles.css"></head><body><main><h1>Nyanko</h1><p>Conecta esta extensión con la aplicación de escritorio.</p><label>Dirección local<input id="api-url" value="http://127.0.0.1:8765"></label><label>Nombre de esta instalación<input id="label" value="Navegador"></label><label>Código de emparejamiento<input id="code" autocomplete="off"></label><button id="pair">Emparejar</button><output id="status"></output><hr><h2>Privacidad por sitio</h2><p>Una línea por dominio. La lista bloqueada siempre tiene prioridad; una lista permitida vacía acepta cualquier sitio.</p><label>Sitios permitidos<textarea id="allowed" rows="6" placeholder="example.com"></textarea></label><label>Sitios bloqueados<textarea id="blocked" rows="6"></textarea></label><button id="save">Guardar sitios</button></main><script type="module" src="options.js"></script></body></html>
